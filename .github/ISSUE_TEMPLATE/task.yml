name: "🦅 Task"
description: "Ask Crunch to work on something"
body:
  - type: dropdown
    id: model
    attributes:
      label: Model
      description: "GitHub Copilot model to use (leave default if unsure)"
      options:
        - "(default: gpt-4o)"
        - gpt-4o
        - gpt-4.1
        - gpt-5.4
        - gpt-5.3-codex
        - claude-sonnet-4.6
        - claude-opus-4.6
        - claude-haiku-4.5
    validations:
      required: false
  - type: textarea
    id: task
    attributes:
      label: Task
      description: "Describe what you want Crunch to do"
    validations:
      required: true
# https://docs.github.com/en/copilot/reference/ai-models/supported-models?utm_source=changelog-codex53-cta&utm_medium=changelog&utm_campaign=newmodels